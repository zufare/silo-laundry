<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard SILO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <aside class="sidebar">
    <h2>SILO</h2>

    <a href="#">Dashboard</a>
    <a href="#">Pelanggan</a>
    <a href="#">Laundry</a>
    <a href="#">Transaksi</a>
    <a href="#">Laporan</a>
  </aside>

  <main class="content">

    <h2>Input Laundry</h2>

<form class="laundry-form">

  <input type="text" placeholder="Nama Pelanggan">

  <input type="number" placeholder="Berat Cucian (kg)">

  <select>
    <option>Cuci Reguler</option>
    <option>Cuci Express</option>
    <option>Cuci + Setrika</option>
  </select>

  <button type="submit">Simpan</button>

</form>

    <h1>Dashboard Admin</h1>

    <div class="cards">

      <div class="card">
        <h3>12</h3>
        <p>Laundry Diproses</p>
      </div>

      <div class="card">
        <h3>30</h3>
        <p>Laundry Selesai</p>
      </div>

      <div class="card">
        <h3>Rp 2.400.000</h3>
        <p>Pendapatan</p>
      </div>

    </div>

  </main>

</div>

</body>
</html>
