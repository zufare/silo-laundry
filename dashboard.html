<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard SILO</title>
  <link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>

<div class="dashboard">

  <aside class="sidebar">
    <h2>SILO</h2>

    <a href="#">Dashboard</a>
    <a href="#">Pelanggan</a>
    <a href="#">Laundry</a>
    <a href="#">Transaksi</a>
    <a href="#">Laporan</a>
  </aside>

  <main class="content">

    <h2>Data Laundry</h2>

<table class="laundry-table">

  <thead>
    <tr>
      <th>Nama</th>
      <th>Berat</th>
      <th>Layanan</th>
      <th>Status</th>
    </tr>
  </thead>

  <tbody id="laundryTableBody">

</tbody>

    <tr>
      <td>Budi</td>
      <td>3 kg</td>
      <td>Express</td>
      <td>
        <span class="status process">
          Diproses
        </span>
      </td>
    </tr>

    <tr>
      <td>Rina</td>
      <td>5 kg</td>
      <td>Reguler</td>
      <td>
        <span class="status done">
          Selesai
        </span>
      </td>
    </tr>

  </tbody>

</table>

    <h2>Input Laundry</h2>

<form class="laundry-form" id="laundryForm">

  <input
    type="text"
    id="customerName"
    placeholder="Nama Pelanggan"
    required
  >

  <input
    type="number"
    id="weight"
    placeholder="Berat Cucian (kg)"
    required
  >

  <select id="service">

    <option>Cuci Reguler</option>
    <option>Cuci Express</option>
    <option>Cuci + Setrika</option>

  </select>

  <button type="submit">
    Simpan
  </button>

</form>
    <h1>Dashboard Admin</h1>

    <div class="cards">

      <div class="card">
        <h3>12</h3>
        <p>Laundry Diproses</p>
      </div>

      <div class="card">
        <h3>30</h3>
        <p>Laundry Selesai</p>
      </div>

      <div class="card">
        <h3>Rp 2.400.000</h3>
        <p>Pendapatan</p>
      </div>

    </div>

  </main>

</div>

</body>
</html>
